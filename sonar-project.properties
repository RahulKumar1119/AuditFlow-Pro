# SonarQube Configuration for AuditFlow-Pro
# Project Key: AuditFlow-Pro

# Project identification
sonar.projectKey=AuditFlow-Pro
sonar.projectName=AuditFlow-Pro
sonar.projectVersion=1.0.0
sonar.projectDescription=AI-Powered Loan Document Auditor - Serverless Application

# Source code location
sonar.sources=auditflow-pro
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/dist/**,**/build/**,**/coverage/**,**/.git/**,**/venv/**,**/vite.config.ts,**/vitest.config.ts,**/webpack.config.js,**/jest.config.js,**/*.config.ts,**/*.config.js,**/.hypothesis/**,**/deployment_package.zip,**/.scannerwork/**,**/test_reports/**

# Test files
sonar.tests=auditflow-pro
sonar.test.inclusions=**/*test*.py,**/*test*.ts,**/*test*.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage reports (optional - only if generated)
sonar.javascript.lcov.reportPaths=auditflow-pro/frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=auditflow-pro/backend/coverage.xml

# Frontend (TypeScript/React)
# Let SonarQube auto-detect language

# Backend (Python)
# Let SonarQube auto-detect language
sonar.python.version=3.9

# Code coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/*test*.py,**/*test*.ts,**/*test*.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/__pycache__/**,**/dist/**,**/build/**

# Quality Gate - Relaxed thresholds for initial setup
sonar.qualitygate.wait=false

# Duplications
sonar.cpd.exclusions=**/node_modules/**,**/__pycache__/**,**/.hypothesis/**,**/tests/**,**/*test*.py,**/*test*.ts,**/*test*.tsx,**/*.spec.ts,**/*.spec.tsx

# Text and secrets analysis exclusions
sonar.text.exclusions=**/.hypothesis/**,**/deployment_package.zip,**/coverage/**

# Explicitly exclude .hypothesis from text inclusions
sonar.text.inclusions=**/*

# Code smells - Ignore unused variables in test files
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1481
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*test*.py
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1481
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*test*.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1481
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.spec.ts

# Security
sonar.security.hotspots.exclusions=**/test/**,**/tests/**

# Performance
sonar.performance.max.violations.per.file=10

# Logging
sonar.log.level=INFO
